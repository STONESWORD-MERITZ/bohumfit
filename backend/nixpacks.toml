# BOHUMFIT backend deployment for Railway when the service root is `backend/`.

providers = ["python"]

[variables]
PLAYWRIGHT_BROWSERS_PATH = "0"

[phases.setup]
aptPkgs = [
  "...",
  "fonts-noto-cjk",
  "libnss3",
  "libnspr4",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdrm2",
  "libdbus-1-3",
  "libxkbcommon0",
  "libxcomposite1",
  "libxdamage1",
  "libxfixes3",
  "libxrandr2",
  "libgbm1",
  "libasound2",
  "libpango-1.0-0",
  "libcairo2"
]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "PLAYWRIGHT_BROWSERS_PATH=0 python -m playwright install chromium"
]

[start]
cmd = "bash start.sh"
